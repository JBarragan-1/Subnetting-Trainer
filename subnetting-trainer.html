<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnetting Trainer</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #8a8983;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ee;
    --color-border-secondary: #c7c5bb;
    --color-border-tertiary: #e0ddd2;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--font-sans); background: #faf9f4; color: var(--color-text-primary); margin: 0; padding: 16px; max-width: 1400px; margin: 0 auto; }
  .st-app{position:relative}
  .st-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:12px;flex-wrap:wrap}
  .st-title{font-size:24px;font-weight:500;margin:0}
  .st-sub{font-size:13px;color:var(--color-text-secondary);margin:2px 0 0}
  .st-hud{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .st-pill{font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:inline-flex;align-items:center;gap:6px}
  .st-pill b{font-weight:500}
  .st-pill.tier-vet{background:#FAEEDA;color:#633806;border-color:#E9A13B}
  .st-pill.tier-exp{background:#FBEAF0;color:#72243E;border-color:#D45285}
  .st-pill.tier-night{background:#1F1B45;color:#fff;border-color:#534AB7}
  .help-btn{padding:4px 10px;border-radius:999px;border:1px solid var(--color-border-tertiary);background:transparent;cursor:pointer;font-size:12px;color:var(--color-text-secondary)}
  .st-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px}
  .st-mission{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:16px 18px;border:1px solid var(--color-border-tertiary)}
  .st-mission h3{font-size:16px;font-weight:500;margin:0 0 6px}
  .st-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .st-tab{font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--color-border-tertiary);background:transparent;cursor:pointer;color:var(--color-text-secondary)}
  .st-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
  .st-tab.locked{opacity:.45;cursor:not-allowed}
  .st-tab.boss{color:#A32D2D;border-color:#E24B4A}
  .st-tab.boss.active{background:#A32D2D;color:#fff}
  .st-tab.sandbox{color:#085041;border-color:#1D9E75}
  .st-tab.sandbox.active{background:#1D9E75;color:#fff}
  .st-tab.challenge{color:#BA7517;border-color:#E9A13B}
  .st-tab.challenge.active{background:#BA7517;color:#fff}
  .st-tab.topo{color:#534AB7;border-color:#AFA9EC}
  .st-tab.topo.active{background:#534AB7;color:#fff}
  .st-tab.ach{color:#D45285;border-color:#F4C0D1}
  .st-tab.ach.active{background:#D45285;color:#fff}
  .st-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .st-mono{font-family:var(--font-mono)}
  .st-input{padding:8px 10px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-family:var(--font-mono);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);width:180px}
  .st-btn{padding:8px 14px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
  .st-btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
  .st-btn.boss{background:#A32D2D;color:#fff;border-color:#A32D2D}
  .st-btn.lesson{background:#534AB7;color:#fff;border-color:#534AB7}
  .st-btn.challenge{background:#BA7517;color:#fff;border-color:#BA7517}
  .st-btn.challenge.exp{background:#D45285;border-color:#D45285}
  .st-btn.challenge.night{background:#1F1B45;border-color:#534AB7}
  .st-btn:disabled{opacity:.45;cursor:not-allowed}
  .st-mc{display:grid;gap:8px;margin-top:10px}
  .st-mc button{text-align:left;padding:10px 12px;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:14px;color:var(--color-text-primary)}
  .st-mc button.correct{background:#EAF3DE;border-color:#639922;color:#173404}
  .st-mc button.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313}
  .st-feedback{margin-top:10px;padding:10px 12px;border-radius:var(--border-radius-md);font-size:13px;display:none}
  .st-feedback.ok{background:#EAF3DE;color:#173404;display:block}
  .st-feedback.bad{background:#FCEBEB;color:#501313;display:block}
  .st-progress{height:8px;background:var(--color-background-secondary);border-radius:999px;overflow:hidden;margin:8px 0 12px}
  .st-progress>div{height:100%;background:#1D9E75;transition:width .3s}
  .st-timer{font-family:var(--font-mono);font-size:14px;font-weight:500}
  .st-timer.warn{color:#BA7517}
  .st-timer.crit{color:#A32D2D}
  .st-dz{background:var(--color-background-primary);border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px;min-height:50px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .st-chip{padding:6px 10px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:grab;font-family:var(--font-mono);font-size:13px}
  .st-chip.placed{background:#E1F5EE;border-color:#1D9E75;color:#085041}
  .st-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0}
  .st-pair>div:first-child{padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;display:flex;align-items:center}
  .study-section{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--color-border-tertiary)}
  .study-section:last-child{border-bottom:0}
  .study-section h4{margin:0 0 6px;font-size:14px;font-weight:500}
  .study-section p{margin:0 0 6px;font-size:14px;line-height:1.6;color:var(--color-text-secondary)}
  .study-section .ex{background:var(--color-background-secondary);padding:8px 10px;border-radius:var(--border-radius-md);font-family:var(--font-mono);font-size:13px;margin:6px 0}
  .stage-tabs{display:flex;gap:4px;margin-bottom:12px;padding:4px;background:var(--color-background-secondary);border-radius:999px;width:fit-content}
  .stage-tab{padding:6px 14px;border-radius:999px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
  .stage-tab.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
  .stage-tab.locked{opacity:.5;cursor:not-allowed}
  .lesson-card{background:#EEEDFE;border:1px solid #AFA9EC;border-radius:var(--border-radius-lg);padding:16px 18px}
  .lesson-card h3{margin:0 0 4px;font-size:16px;font-weight:500;color:#26215C}
  .lesson-card .subt{margin:0 0 12px;font-size:13px;color:#3C3489}
  .bit-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
  .bit-cell{width:42px;text-align:center;cursor:pointer}
  .bit-cell .v{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;font-family:var(--font-mono)}
  .bit-cell .b{width:42px;height:42px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:18px;font-weight:500}
  .bit-cell .b.on{background:#185FA5;color:#fff;border-color:#185FA5}
  .target-display{text-align:center;margin:8px 0;font-size:24px;font-family:var(--font-mono);font-weight:500}
  .target-display.good{color:#1D9E75}
  .live-readout{text-align:center;margin:8px 0;padding:8px;background:var(--color-background-primary);border-radius:var(--border-radius-md)}
  .live-readout .v{font-size:20px;font-family:var(--font-mono);font-weight:500}
  .mask-builder{display:flex;gap:2px;margin:12px 0;flex-wrap:nowrap;overflow-x:auto}
  .mb-bit{width:18px;height:24px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:var(--font-mono);font-size:11px;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mb-bit.on{background:#185FA5;color:#fff;border-color:#185FA5}
  .mb-dot{width:6px;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary)}
  .stepper{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
  .step-card{background:var(--color-background-primary);padding:12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary)}
  .step-card .l{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  .step-card .v{font-family:var(--font-mono);font-size:14px}
  .vlsm-req{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--color-background-primary);border-radius:var(--border-radius-md);margin:6px 0;border:1px solid var(--color-border-tertiary)}
  .vlsm-req.placed{background:#E1F5EE;border-color:#1D9E75}
  .vlsm-req .name{font-weight:500}
  .vlsm-req .meta{font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)}
  .vlsm-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
  .vlsm-slot{padding:8px;background:var(--color-background-primary);border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);text-align:center;font-family:var(--font-mono);font-size:12px;cursor:pointer}
  .vlsm-slot.taken{background:#E1F5EE;border-style:solid;border-color:#1D9E75;color:#085041}
  .ch-tier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}
  .ch-tier-card{padding:16px;border-radius:var(--border-radius-lg);border:1px solid;cursor:pointer}
  .ch-tier-card.vet{background:#FAEEDA;border-color:#E9A13B}
  .ch-tier-card.exp{background:#FBEAF0;border-color:#D45285}
  .ch-tier-card.night{background:#1F1B45;border-color:#534AB7;color:#fff}
  .ch-tier-card .name{font-size:18px;font-weight:500;margin-bottom:6px}
  .ch-tier-card .meta{font-size:12px;opacity:.8}
  .ch-tier-card .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;font-size:11px}
  .ch-tier-card .stats div{background:rgba(255,255,255,.4);padding:4px 6px;border-radius:4px}
  .ch-tier-card.night .stats div{background:rgba(255,255,255,.1)}
  .boss-banner{background:#501313;color:#fff;padding:14px 18px;border-radius:var(--border-radius-lg);margin-bottom:12px}
  .boss-banner h3{margin:0 0 4px;color:#fff;font-size:18px}
  .boss-banner p{margin:0;font-size:13px;color:#F7C1C1}
  .hp-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 14px}
  .hp-bar{background:var(--color-background-primary);padding:10px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary)}
  .hp-bar .lab{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;display:flex;justify-content:space-between}
  .hp-bar .track{height:6px;background:var(--color-background-secondary);border-radius:999px;overflow:hidden}
  .hp-bar .fill{height:100%;background:#A32D2D;transition:width .4s}
  .hp-bar.done .fill{background:#1D9E75}
  .sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sb-stat{background:var(--color-background-primary);padding:10px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary)}
  .sb-stat .lab{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
  .sb-stat .val{font-family:var(--font-mono);font-size:14px}
  .bin-row{display:flex;gap:4px;flex-wrap:wrap;font-family:var(--font-mono);font-size:12px;margin:6px 0}
  .bin-octet{display:flex}
  .bin-bit{padding:3px 5px}
  .bin-bit.net{background:#185FA5;color:#fff}
  .bin-bit.host{background:#F1EFE8}
  .bin-dot{padding:3px 2px;color:var(--color-text-tertiary)}
  .topo-layout{display:grid;grid-template-columns:200px 1fr 260px;gap:12px;margin-top:8px}
  .topo-panel{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;max-height:560px;overflow-y:auto}
  .topo-panel h4{font-size:13px;margin:0 0 8px;font-weight:500}
  .topo-tool{padding:8px 10px;margin-bottom:6px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border:1px solid transparent}
  .topo-tool.active{background:#E6F1FB;border-color:#185FA5}
  .topo-canvas-wrap{background:#F8F7F1;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);position:relative;overflow:hidden;height:560px}
  .topo-canvas{width:100%;height:100%;position:relative}
  .topo-device{position:absolute;transform:translate(-50%,-50%);cursor:move;text-align:center;z-index:2}
  .topo-device .icon{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;background:#fff;border:1.5px solid var(--color-border-secondary);margin:0 auto}
  .topo-device.router .icon{background:#FCEBEB;border-color:#E24B4A}
  .topo-device.switch .icon{background:#E6F1FB;border-color:#185FA5}
  .topo-device.host .icon{background:#EAF3DE;border-color:#639922}
  .topo-device .name{font-size:11px;font-family:var(--font-mono);margin-top:2px;padding:1px 6px;background:rgba(255,255,255,.85);border-radius:4px;display:inline-block}
  .topo-device.selected .icon{box-shadow:0 0 0 3px #534AB7}
  .topo-device.linking .icon{box-shadow:0 0 0 3px #BA7517}
  .topo-canvas svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
  .topo-canvas svg .lk{stroke:#5F5E5A;stroke-width:2;fill:none}
  .topo-canvas svg .lk.assigned{stroke:#1D9E75;stroke-width:2.5}
  .topo-canvas svg .lk.warn{stroke:#BA7517;stroke-dasharray:5,3}
  .topo-canvas svg .lk-hit{stroke:transparent;stroke-width:14;fill:none;pointer-events:stroke;cursor:pointer}
  .topo-canvas svg text{font-family:var(--font-mono);font-size:11px;fill:var(--color-text-primary);paint-order:stroke;stroke:#F8F7F1;stroke-width:3}
  .topo-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .topo-stat{background:var(--color-background-secondary);padding:6px 8px;border-radius:var(--border-radius-md);font-size:11px}
  .topo-stat .v{font-family:var(--font-mono);font-size:13px;font-weight:500}
  .topo-input{padding:6px 8px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-family:var(--font-mono);font-size:12px;width:100%;box-sizing:border-box;background:var(--color-background-primary)}
  .topo-subnet{padding:8px 10px;margin-bottom:6px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;border:1px solid var(--color-border-tertiary)}
  .topo-subnet .net{font-family:var(--font-mono);font-weight:500}
  .topo-subnet .det{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
  .topo-validate{margin-top:8px;padding:8px 10px;border-radius:var(--border-radius-md);font-size:12px}
  .topo-validate.ok{background:#EAF3DE;color:#173404}
  .topo-validate.bad{background:#FBF1DE;color:#874C0A}
  @media (max-width:900px){.topo-layout{grid-template-columns:1fr}.topo-canvas-wrap{height:400px}}
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .ach-card{padding:14px;border-radius:var(--border-radius-lg);border:1px solid}
  .ach-card.unlocked{background:#EAF3DE;border-color:#97C459}
  .ach-card.locked{background:var(--color-background-secondary);border-color:var(--color-border-tertiary);opacity:.65}
  .ach-card .ico{font-size:28px;margin-bottom:6px}
  .ach-card.locked .ico{filter:grayscale(1)}
  .ach-card .name{font-weight:500;font-size:14px;margin-bottom:2px}
  .ach-card .desc{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.4}
  .ach-card .reward{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.6);display:inline-block;font-family:var(--font-mono)}
  .ach-card.unlocked .reward{background:#C0DD97;color:#173404}
  .ach-section-title{font-size:14px;font-weight:500;margin:14px 0 8px;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
  .ach-progress{margin-bottom:14px;padding:12px;background:var(--color-background-primary);border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary)}
  .ach-progress .lab{font-size:13px;margin-bottom:6px;font-weight:500}
  .ach-progress .bar{height:10px;background:var(--color-background-secondary);border-radius:999px;overflow:hidden}
  .ach-progress .bar>div{height:100%;background:linear-gradient(90deg,#D45285,#BA7517,#1D9E75);transition:width .4s}
  .toast{position:fixed;bottom:24px;right:24px;z-index:1000;background:#FFF;border:1px solid #1D9E75;border-radius:var(--border-radius-lg);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;min-width:240px;animation:slideIn .3s ease-out}
  .toast .ico{font-size:28px}
  .toast .body .t{font-size:11px;color:#085041;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
  .toast .body .n{font-size:14px;font-weight:500;color:#173404}
  .toast .body .r{font-size:11px;color:var(--color-text-secondary)}
  @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
  .onb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
  .onb-tooltip{position:fixed;max-width:340px;background:#FFF;border-radius:var(--border-radius-lg);padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:300}
  .onb-tooltip h4{margin:0 0 6px;font-size:15px;font-weight:500}
  .onb-tooltip p{margin:0 0 10px;font-size:13px;color:var(--color-text-secondary);line-height:1.5}
  .onb-tooltip .nav{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .onb-tooltip .dots{display:flex;gap:4px}
  .onb-tooltip .dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-tertiary)}
  .onb-tooltip .dot.active{background:#185FA5}
  .onb-spotlight{position:fixed;box-shadow:0 0 0 9999px rgba(0,0,0,.6);border-radius:8px;pointer-events:none;z-index:201;transition:all .3s}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<h1 class="sr-only">Subnetting Trainer — interactive learning experience for IPv4 subnetting</h1>

<div class="st-app">
  <div class="st-header">
    <div>
      <h2 class="st-title">Subnetting Trainer</h2>
      <p class="st-sub">Study, practice, prove it. Earn badges along the way.</p>
    </div>
    <div class="st-hud" id="hud-zone">
      <span class="st-pill">Score <b id="hud-score">0</b></span>
      <span class="st-pill">Streak <b id="hud-streak">0</b></span>
      <span class="st-pill">Mission <b id="hud-mission">0</b>/6</span>
      <span class="st-pill">🏅 <b id="hud-ach-count">0</b>/15</span>
      <span class="st-pill tier-vet" id="hud-vet" style="display:none">🥉</span>
      <span class="st-pill tier-exp" id="hud-exp" style="display:none">🥈</span>
      <span class="st-pill tier-night" id="hud-night" style="display:none">🥇</span>
      <span class="st-pill" id="hud-boss" style="display:none">🐉</span>
      <button class="help-btn" id="help-btn">? Help</button>
    </div>
  </div>
  <div class="st-tabs" id="tabs"></div>
  <div id="stages"></div>
</div>

<script>
(function(){
const S={score:0,streak:0,completed:[!1,!1,!1,!1,!1,!1],lessonDone:[!1,!1,!1,!1,!1,!1],bossDefeated:!1,challengeBeaten:{vet:!1,exp:!1,night:!1},achievements:{},flags:{sandboxUsed:!1,perfectBoss:!0},current:0,stage:'study',onboardingDone:!1};

function unlock(id){if(S.achievements[id])return;const a=ACH.find(x=>x.id===id);if(!a)return;S.achievements[id]=!0;S.score+=a.r;toast(a);hud();}

function checkAch(e,d){

  if(e==='mission'){unlock('first-mission');const c=S.completed.filter(Boolean).length;if(c>=3)unlock('half-way');if(c===6)unlock('all-missions');if(d&&d.perfect)unlock('perfect-mission');if(d&&d.timeLeft>=30)unlock('speedrun');}

function ipToInt(ip){return ip.split('.').reduce((a,o)=>(a<<8)+(parseInt(o,10)&255),0)>>>0;}
function intToIp(n){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
function maskFP(p){return p===0?0:(0xFFFFFFFF<<(32-p))>>>0;}
function isIp(ip){const p=ip.split('.');if(p.length!==4)return!1;return p.every(x=>/^\d+$/.test(x)&&+x>=0&&+x<=255);}
function cls(o){if(o>=1&&o<=126)return 'A';if(o===127)return 'Loopback';if(o>=128&&o<=191)return 'B';if(o>=192&&o<=223)return 'C';if(o>=224&&o<=239)return 'D';return 'E';}
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a,n){return shuf(a).slice(0,n);}
function pone(a){return a[Math.floor(Math.random()*a.length)];}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shO(it){const c=it.opts[it.a];const o=shuf(it.opts);return {q:it.q,opts:o,a:o.indexOf(c)};}

function L1(m,c){c.innerHTML='<h3>🧪 Class Detector</h3><p class="subt">Slide to class. 4 right.</p>';const z=[{f:1,t:126,l:'A',c:'#B5D4F4'},{f:127,t:127,l:'LB',c:'#D3D1C7'},{f:128,t:191,l:'B',c:'#9FE1CB'},{f:192,t:223,l:'C',c:'#FAC775'},{f:224,t:239,l:'D',c:'#CECBF6'},{f:240,t:255,l:'E',c:'#F4C0D1'}];const ln=document.createElement('div');ln.style.cssText='position:relative;height:50px;margin:20px 0 30px;background:var(--color-background-primary);border-radius:var(--border-radius-md);';z.forEach(zo=>{const d=document.createElement('div');d.style.cssText='position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;background:'+zo.c;d.style.left=(zo.f/255)*100+'%';d.style.width=((zo.t-zo.f+1)/255)*100+'%';d.textContent=zo.l;ln.appendChild(d);});c.appendChild(ln);const sl=document.createElement('input');sl.type='range';sl.min=0;sl.max=255;sl.value=10;sl.style.width='100%';c.appendChild(sl);const ps=shuf([{ip:'10.x.x.x',e:'A'},{ip:'126.0.0.1',e:'A'},{ip:'172.20.x.x',e:'B'},{ip:'190.10.10.10',e:'B'},{ip:'192.168.x.x',e:'C'},{ip:'225.0.0.5',e:'D'},{ip:'250.1.1.1',e:'E'}]).slice(0,6);let pi=0,co=0;const pb=document.createElement('div');pb.style.cssText='margin-top:14px;padding:10px;background:var(--color-background-primary);border-radius:var(--border-radius-md);';c.appendChild(pb);function wc(v){const x=z.find(z=>v>=z.f&&v<=z.t);return x?x.l:'';}function rf(){const v=parseInt(sl.value);pb.innerHTML='<div style="display:flex;justify-content:space-between;"><div><div style="font-size:12px;color:var(--color-text-secondary);">IP:</div><div style="font-family:var(--font-mono);">'+ps[pi].ip+'</div></div><div>Class: <b>'+ps[pi].e+'</b></div></div><div style="font-size:13px;color:var(--color-text-secondary);margin-top:6px;">Slider: '+v+' ('+wc(v)+') · Correct: '+co+'/4</div>';}sl.oninput=rf;const lb=document.createElement('button');lb.className='st-btn lesson';lb.style.marginTop='10px';lb.textContent='Lock';lb.onclick=()=> function L2(m,c){c.innerHTML='<h3>🧪 Mask Builder</h3><p class="subt">Toggle bits left to right. 3 targets.</p>';const ts=shuf(['/25','/26','/27','/28','/22','/21','/20']).slice(0,5);let r=0,h=0,p=24;const b=document.createElement('div');b.className='mask-builder';c.appendChild(b);const sp=document.createElement('div');sp.className='stepper';c.appendChild(sp);const st=document.createElement('div');st.style.cssText='text-align:center;font-size:13px;';c.appendChild(st);function rf(){b.innerHTML='';for(let i=0;i<32;i++){const x=document.createElement('button');x.className='mb-bit'+(i<p?' on':'');x.textContent=i<p?'1':'0';x.onclick=()=>{p=(i<p)?i:i+1;rf();};b.appendChild(x);if(i===7||i===15||i===23){const d=document.createElement('div');d.className='mb-dot';d.textContent='.';b.appendChild(d);}}sp.innerHTML='';[['Prefix','/'+p],['Mask',intToIp(maskFP(p))],['Net',p],['Host',32-p]].forEach(([l,v])=>{const e=document.createElement('div');e.className='step-card';e.innerHTML='<div class="l">'+l+'</div><div class="v">'+v+'</div>';sp.appendChild(e);});const tn=parseInt(ts[r].replace('/',''),10);st.innerHTML='Target: <b>'+ts[r]+'</b> · Hits: '+h+(p===tn?' ✓':'');if(p===tn){h++;r++;if(h>=3){setTimeout(()=>lessonDone(m,c),600);return;}p=24;setTimeout(rf,800);}}rf();}

function L3(m,c){c.innerHTML='<h3>🧪 Host Calculator</h3><p class="subt">Slide prefix. 4 targets.</p>';const ts=shuf([{h:30,l:'30'},{h:62,l:'62'},{h:14,l:'14'},{h:126,l:'126'},{h:6,l:'6'},{h:254,l:'254'}]).slice(0,6);let r=0,hi=0,p=24;const sl=document.createElement('input');sl.type='range';sl.min=8;sl.max=30;sl.value=24;sl.style.width='100%';c.appendChild(sl);const g=document.createElement('div');g.className='stepper';g.style.gridTemplateColumns='repeat(3,1fr)';c.appendChild(g);const tg=document.createElement('div');tg.style.cssText='text-align:center;font-size:14px;';c.appendChild(tg);function rf(){p=parseInt(sl.value);const hb=32-p;const u=Math.max(0,Math.pow(2,hb)-2);g.innerHTML='';[['Prefix','/'+p],['Bits',hb],['Usable',u]].forEach(([l,v])=>{const e=document.createElement('div');e.className='step-card';e.innerHTML='<div class="l">'+l+'</div><div class="v">'+v+'</div>';g.appendChild(e);});const t=ts[r];tg.innerHTML='Target: <b>'+t.l+' usable</b> · Hits: '+hi+(u===t.h?' ✓':'');if(u===t.h){hi++;r++;if(hi>=4){setTimeout(()=>lessonDone(m,c),600);return;}sl.value=24;setTimeout(rf,800);}}sl.oninput=rf;rf();}

function L4(m,c){c.innerHTML='<h3>🧪 Network ID Stepper</h3><p class="subt">Click the boundary containing the IP.</p>';const sc=[];while(sc.length<4){const pre=pone([22,25,26,27,28]);const o1=pone([10,172,192]);let o2,o3,o4;if(o1===10){o2=rnd(0,255);o3=rnd(0,255);o4=rnd(0,255);}else if(o1===172){o2=rnd(16,31);o3=rnd(0,255);o4=rnd(0,255);}else{o2=168;o3=rnd(0,255);o4=rnd(0,255);}const ip=o1+'.'+o2+'.'+o3+'.'+o4;const net=(ipToInt(ip)&maskFP(pre))>>>0;sc.push({ip,pre,exp:intToIp(net)});}let r=0,h=0;const ib=document.createElement('div');ib.style.cssText='background:var(--color-background-primary);padding:10px;border-radius:var(--border-radius-md);text-align:center;font-family:var(--font-mono);';c.appendChild(ib);const sl=document.createElement('div');sl.className='vlsm-slots';c.appendChild(sl);const st=document.createElement('div');st.style.cssText='text-align:center;font-size:13px;margin-top:8px;';c.appendChild(st);function rf(){const s=sc[r];ib.textContent=s.ip+' /'+s.pre;const m=maskFP(s.pre);const io=Math.floor(s.pre/8);const mo=parseInt(intToIp(m).split('.')[io],10);const bs=256-mo;const ipo=s.ip.split('.').map(x=>parseInt(x,10));const iv=ipo[io];sl.innerHTML='';const bds=[];for(let v=0;v<256;v+=bs)bds.push(v);const ss=Math.max(0,Math.floor(iv/bs)-3);bds.slice(ss,ss+8).forEach(b=>{const oct=ipo.slice();oct[io]=b;for(let k=io+1;k<4;k++)oct[k]=0;const ni=oct.join('.');const sx=document.createElement('div');sx.className='vlsm-slot';sx.textContent=ni;sx.onclick=()=>{if(ni===s.exp){sx.classList.add('taken');h++;r++;st.innerHTML='✓ '+s.exp;if(h>=3){setTimeout(()=>lessonDone(m,c),800);return;}setTimeout(rf,1100);}else st.innerHTML='✗ try again';};sl.appendChild(sx);});st.textContent='Round '+(r+1)+'/3 · Hits: '+h;}rf();}

function L5(m,c){const pl=[{s:'192.168.1.0/24',r:[{n:'Sales',h:50,p:26},{n:'Eng',h:25,p:27},{n:'Guest',h:10,p:28},{n:'P2P',h:2,p:30}]},{s:'10.0.0.0/24',r:[{n:'Prod',h:100,p:25},{n:'Office',h:30,p:27},{n:'IoT',h:12,p:28},{n:'Mgmt',h:2,p:30}]}];const sc=pone(pl);const rs=sc.r.map(r=>Object.assign({placed:!1},r));c.innerHTML='<h3>🧪 VLSM Allocator</h3><p class="subt">Allocate '+sc.s+'.</p>';const off=['/25','/26','/27','/28','/29','/30'];let act=0;const rw=document.createElement('div');c.appendChild(rw);const lb=document.createElement('div');lb.style.cssText='font-size:13px;margin:14px 0 4px;color:var(--color-text-secondary);';c.appendChild(lb);const sl=document.createElement('div');sl.className='vlsm-slots';sl.style.gridTemplateColumns='repeat(6,1fr)';c.appendChild(sl);const fb=document.createElement('div');c.appendChild(fb);function rf(){rw.innerHTML='';rs.forEach((r,i)=>{const row=document.createElement('div');row.className='vlsm-req'+(r.placed?' placed':'');row.innerHTML='<div><div class="name">'+r.n+'</div><div class="meta">'+r.h+' hosts</div></div><div class="meta">'+(r.placed?'✓':(act===i?'← Active':''))+'</div>';if(!r.placed&&act!==i)row.style.cursor='pointer';row.onclick=()=>{if(!r.placed){act=i;rf();}};rw.appendChild(row);});const ar=rs[act];lb.innerHTML=ar&&!ar.placed?'Pick smallest for <b>'+ar.h+' hosts</b>:':'Done.';sl.innerHTML='';off.forEach(p=>{const pn=parseInt(p.replace('/',''),10);const u=Math.pow(2,32-pn)-2;const slt=document.createElement('div');slt.className='vlsm-slot';slt.innerHTML=p+'<br><span style="font-size:10px;color:var(--color-text-secondary);">'+u+' hosts</span>';slt.onclick=()=>{if(!ar||ar.placed)return;if(pn===ar.p){ar.placed=!0;const nx=rs.findIndex(r=>!r.placed);act=nx===-1?act:nx;fb.innerHTML='<div class="st-feedback ok">✓ Fits.</div>';setTimeout(()=>fb.innerHTML='',1400);if(rs.every(r=>r.placed)){setTimeout(()=>lessonDone(m,c),800);return;}rf();}else if(pn<ar.p){fb.innerHTML='<div class="st-feedback bad">✗ Too small.</div>';setTimeo function matchRun(m,t,co){co.innerHTML='<h3 style="margin:0 0 4px;">'+m.title+'</h3><p style="font-size:13px;color:var(--color-text-secondary);">Drag masks to CIDR. '+t.items.length+' pairs.</p>';const ps=t.items;const pl=document.createElement('div');pl.className='st-dz';pl.style.marginBottom='12px';shuf(ps.map(p=>p.right)).forEach(r=>{const c=document.createElement('div');c.className='st-chip';c.draggable=!0;c.textContent=r;c.dataset.value=r;c.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',r);});pl.appendChild(c);});co.appendChild(pl);const tg=document.createElement('div');co.appendChild(tg);ps.forEach(p=>{const r=document.createElement('div');r.className='st-pair';const l=document.createElement('div');l.innerHTML='<span class="st-mono">'+p.left+'</span>';const d=document.createElement('div');d.className='st-dz';d.dataset.expected=p.right;d.addEventListener('dragover',e=>e.preventDefault());d.addEventListener('drop',e=>{e.preventDefault();const v=e.dataTransfer.getData('text/plain');const ch=Array.from(document.querySelectorAll('.st-chip')).find(c=>c.dataset.value===v);if(!ch)return;if(d.firstChild){d.firstChild.classList.remove('placed');pl.appendChild(d.firstChild);}ch.classList.add('placed');d.appendChild(ch);});r.appendChild(l);r.appendChild(d);tg.appendChild(r);});const cb=document.createElement('button');cb.className='st-btn primary';cb.textContent='Check';cb.style.marginTop='10px';co.appendChild(cb);const fb=document.createElement('div');fb.className='st-feedback';co.appendChild(fb);cb.onclick=()=>{let ok=0;tg.querySelectorAll('.st-dz').forEach(d=>{const p=d.querySelector('.st-chip');if(p&&p.dataset.value===d.dataset.expected)ok++;});S.score+=ok*15;if(ok===ps.length){fb.className='st-feedback ok';fb.textContent='🎯 Perfect ('+ok+'/'+ps.length+')';S.completed[m.id]=!0;S.score+=25;S.streak++;checkAch('streak');checkAch('mission',{perfect:!0});const nb=document.createElement('button');nb.className='st-btn primary';nb.textContent='Next →';n function renderSandbox(){checkAch('sandbox');const c=document.createElement('div');c.className='st-card';c.innerHTML='<h3 style="margin:0 0 4px;">🧪 Sandbox</h3><p style="font-size:13px;color:var(--color-text-secondary);">Calculate any IP/prefix.</p>';const r=document.createElement('div');r.className='st-row';const ipI=document.createElement('input');ipI.className='st-input';ipI.value='192.168.1.100';const pI=document.createElement('input');pI.className='st-input';pI.value='26';pI.style.width='80px';const b=document.createElement('button');b.className='st-btn primary';b.textContent='Calculate';r.appendChild(document.createTextNode('IP:'));r.appendChild(ipI);r.appendChild(document.createTextNode('/'));r.appendChild(pI);r.appendChild(b);c.appendChild(r);const o=document.createElement('div');o.style.marginTop='14px';c.appendChild(o);stagesEl.appendChild(c);function calc(){o.innerHTML='';const ip=ipI.value.trim();const pre=parseInt(pI.value.replace('/',''),10);if(!isIp(ip)){o.innerHTML='<div class="st-feedback bad" style="display:block;">Invalid IP.</div>';return;}if(isNaN(pre)||pre<0||pre>32){o.innerHTML='<div class="st-feedback bad" style="display:block;">Bad prefix.</div>';return;}const m=maskFP(pre);const net=(ipToInt(ip)&m)>>>0;const bc=(net|(~m>>>0))>>>0;const hb=32-pre;let u,fh,lh;if(pre===32){u=1;fh='-';lh='-';}else if(pre===31){u=2;fh=intToIp(net);lh=intToIp(bc);}else{u=Math.pow(2,hb)-2;fh=intToIp(net+1);lh=intToIp(bc-1);}const g=document.createElement('div');g.className='sb-grid';[['Network',intToIp(net)+'/'+pre],['Broadcast',intToIp(bc)],['Mask',intToIp(m)],['First',fh],['Last',lh],['Usable',u.toLocaleString()],['Total',Math.pow(2,hb).toLocaleString()],['Class',cls(parseInt(ip.split('.')[0],10))]].forEach(([l,v])=>{const s=document.createElement('div');s.className='sb-stat';s.innerHTML='<div class="lab">'+l+'</div><div class="val">'+v+'</div>';g.appendChild(s);});o.appendChild(g);const bh=document.createElement('p');bh.style.cssText='font-size:13px;font-weight let bs=null;
function renderBoss(){const b=document.createElement('div');b.className='boss-banner';b.innerHTML='<h3>🐉 Final Boss</h3><p>3 in EACH category. Wrong = reset that bar.</p>';stagesEl.appendChild(b);if(S.bossDefeated){const w=document.createElement('div');w.className='st-card';w.style.textAlign='center';w.innerHTML='<div style="font-size:40px;">🏆</div><h3>Defeated</h3><p>Score: <b>'+S.score+'</b></p>';stagesEl.appendChild(w);const t=document.createElement('button');t.className='st-btn boss';t.textContent='Fight again';t.onclick=()=>{S.bossDefeated=!1;bs=null;S.flags.perfectBoss=!0;render();};stagesEl.appendChild(t);return;}const c=document.createElement('div');c.className='st-card';stagesEl.appendChild(c);if(!bs)bs={mc:0,fill:0,match:0};c.innerHTML='<h3>Pick weapon</h3><div class="hp-bars"></div>';const bars=c.querySelector('.hp-bars');['mc','fill','match'].forEach(k=>{const x=document.createElement('div');x.className='hp-bar'+(bs[k]>=3?' done':'');x.innerHTML='<div class="lab"><span>'+k.toUpperCase()+'</span><span>'+bs[k]+'/3</span></div><div class="track"><div class="fill" style="width:'+Math.min(100,(bs[k]/3)*100)+'%"></div></div>';bars.appendChild(x);});const r=document.createElement('div');r.className='st-row';[['mc','MC'],['fill','Fill'],['match','Match']].forEach(([k,l])=>{const x=document.createElement('button');x.className='st-btn';if(bs[k]>=3){x.disabled=!0;x.textContent='✓';}else{x.textContent='Attack: '+l;x.onclick=()=>aBoss(k);}r.appendChild(x);});c.appendChild(r);const ar=document.createElement('div');ar.style.marginTop='14px';ar.id='ba';c.appendChild(ar);if(bs.mc>=3&&bs.fill>=3&&bs.match>=3){S.bossDefeated=!0;S.score+=100;hud();checkAch('boss');render();}}
function aBoss(t){const ar=document.getElementById('ba');ar.innerHTML='';if(t==='mc'){const it=pone(bMC);const q=document.createElement('p');q.style.cssText='font-size:15px;margin:10px 0;';q.textContent=it.q;ar.appendChild(q);const mc=document.createElement('div');mc.className='st-mc';it.opts.forEach((o,i)=>{const b=document.createElement('button');b.textContent=o;b.onclick=()=>{Array.from(mc.children).forEach(c=>c.disabled=!0);if(i===it.a){b.classList.add('correct');bs.mc++;S.score+=30;setTimeout(()=>render(),800);}else{b.classList.add('wrong');mc.children[it.a].classList.add('correct');bs.mc=0;S.streak=0;S.flags.perfectBoss=!1;setTimeout(()=>render(),1100);}hud();};mc.appendChild(b);});ar.appendChild(mc);}else if(t==='fill'){const it=pone(bFill);const q=document.createElement('p');q.style.cssText='font-size:15px;margin:10px 0;';q.textContent=it.q;ar.appendChild(q);const r=document.createElement('div');r.className='st-row';const ip=document.createElement('input');ip.className='st-input';const sb=document.createElement('button');sb.className='st-btn boss';sb.textContent='Submit';r.appendChild(ip);r.appendChild(sb);ar.appendChild(r);const fb=document.createElement('div');fb.className='st-feedback';ar.appendChild(fb);function ck(){const v=ip.value.trim().toLowerCase().replace(/\s+/g,'');const a=String(it.a).toLowerCase().replace(/\s+/g,'');sb.disabled=!0;ip.disabled=!0;if(v===a){fb.className='st-feedback ok';fb.textContent='✓';bs.fill++;S.score+=30;setTimeout(()=>render(),800);}else{fb.className='st-feedback bad';fb.textContent='✗ '+it.a;bs.fill=0;S.streak=0;S.flags.perfectBoss=!1;setTimeout(()=>render(),1300);}hud();}sb.onclick=ck;ip.onkeydown=(e)=>{if(e.key==='Enter')ck();};setTimeout(()=>ip.focus(),50);}else{const it=pone(bMatch);const q=document.createElement('p');q.style.cssText='font-size:15px;margin:10px 0;';q.textContent='Match '+it.left;ar.appendChild(q);const pl=document.createElement('div');pl.className='st-dz';pl.style.marginBottom='12px';const di=bMatch.filter(x=>x.right!==it.right).map(x=>x.right);shuf([it.right,di[0],di[1]]).filter(Boolean).forEach(rt=>{const c=document.createElement('div');c.className='st-chip';c.draggable=!0;c.textContent=rt;c.dataset.value=rt;c.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',rt));pl.appendChild(c);});ar.appendChild(pl);const tr=document.createElement('div');tr.className='st-pair';const lf=document.createElement('div');lf.innerHTML='<span class="st-mono">'+it.left+'</span>';const dr=document.createElement('div');dr.className='st-dz';dr.addEventListener('dragover',e=>e.preventDefault());const fb=document.createElement('div');fb.className='st-feedback';dr.addEventListener('drop',e=>{e.preventDefault();const v=e.dataTransfer.getData('text/plain');if(v===it.right){fb.className='st-feedback ok';fb.textContent='✓';bs.match++;S.score+=30;setTimeout(()=>render(),800);}else{fb.className='st-feedback bad';fb.textContent='✗';bs.match=0;S.streak=0;S.flags.perfectBoss=!1;setTimeout(()=>render(),1200);}hud();});tr.appendChild(lf);tr.appendChild(dr);ar.appendChild(tr);ar.appendChild(fb);}}

function renderAch(){const c=document.createElement('div');c.className='st-card';c.innerHTML='<h3 style="margin:0 0 4px;">🏅 Achievements</h3><p style="font-size:13px;color:var(--color-text-secondary);">Earn badges and bonus points.</p>';stagesEl.appendChild(c);const u=Object.keys(S.achievements).length;const pr=document.createElement('div');pr.className='ach-progress';pr.innerHTML='<div class="lab">Progress: <span style="color:var(--color-text-primary);">'+u+' / '+ACH.length+'</span> ('+Math.round((u/ACH.length)*100)+'%)</div><div class="bar"><div style="width:'+((u/ACH.length)*100)+'%"></div></div>';stagesEl.appendChild(pr);const ct={};ACH.forEach(a=>{if(!ct[a.c])ct[a.c]=[];ct[a.c].push(a);});Object.keys(ct).forEach(cat=>{const t=document.createElement('div');t.className='ach-section-title';t.textContent=cat;stagesEl.appendChild(t);const g=document.createElement('div');g.className='ach-grid';ct[cat].forEach(a=>{const ul=!!S.achievements[a.id];const x=document.createElement('div');x.className='ach-card '+(ul?'unlocked':'locked');x.innerHTML='<div class="ico">'+(ul?a.i:'🔒')+'</div><div class="name">'+a.n+'</div><div class="desc">'+a.d+'</div><span class="reward">+'+a.r+' pts</span>';g.appendChild(x);});stagesEl.appendChild(g);});}

const TOUR=[
{tg:'.st-title',ti:'Welcome to the Subnetting Trainer',bo:'Six missions, a sandbox, topology builder, challenge mode, and a final boss. About 30 seconds of orientation.'},
{tg:'#hud-zone',ti:'Your HUD',bo:'Track score, streak, missions cleared, and achievements. Tier and boss badges appear here as you earn them.'},
{tg:'#tabs',ti:'Tabs are your map',bo:'Missions M1-M6 unlock progressively. Sandbox, Topology, and Achievements stay open. Challenge unlocks after Mission 3, Boss after all six.'},
{tg:'#stages',ti:'Three stages per mission',bo:'Study → Lesson → Mission. Read, practice hands-on (no scoring), then take the scored challenge. Mission stays locked until lesson is cleared.'},
{tg:'#help-btn',ti:'Replay anytime',bo:'Click Help to restart this tour. You are ready - good luck!'}
];

function startTour(){let s=0;const ov=document.createElement('div');ov.className='onb-overlay';document.body.appendChild(ov);const sp=document.createElement('div');sp.className='onb-spotlight';document.body.appendChild(sp);const tt=document.createElement('div');tt.className='onb-tooltip';document.body.appendChild(tt);
function show(){const x=TOUR[s];const el=document.querySelector(x.tg);if(!el){close();return;}const r=el.getBoundingClientRect();sp.style.left=(r.left-8)+'px';sp.style.top=(r.top-8)+'px';sp.style.width=(r.width+16)+'px';sp.style.height=(r.height+16)+'px';tt.innerHTML='<h4>'+x.ti+'</h4><p>'+x.bo+'</p><div class="nav"><div class="dots">'+TOUR.map((_,i)=>'<div class="dot'+(i===s?' active':'')+'"></div>').join('')+'</div><div><button class="st-btn" id="ts" style="margin-right:6px;">Skip</button>'+(s>0?'<button class="st-btn" id="tp" style="margin-right:6px;">Back</button>':'')+'<button class="st-btn primary" id="tn">'+(s===TOUR.length-1?'Done':'Next')+'</button></div></div>';let tp=r.bottom+16;if(tp+200>window.innerHeight)tp=Math.max(20,r.top-220);let tl=Math.max(20,Math.min(window.innerWidth-360,r.left));tt.style.top=tp+'px';tt.style.left=tl+'px';document.getElementById('ts').onclick=close;document.getElementById('tn').onclick=()=>{if(s===TOUR.length-1)close();else{s++;show();}};const pv=document.getElementById('tp');if(pv)pv.onclick=()=>{s--;show();};}
function close(){S.onboardingDone=!0;ov.remove();sp.remove();tt.remove();}
show();}

document.getElementById('help-btn').onclick=startTour;

render();
setTimeout(()=>{if(!S.onboardingDone)startTour();},400);
})();
</script>
